parameters:
    # Map waar smartphone-afbeeldingen worden opgeslagen (zie symfony.com upload docs)
    smartphone_pictures_directory: '%kernel.project_dir%/public/uploads/pictures'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\FileUploader:
        arguments:
            $targetDirectory: '%smartphone_pictures_directory%'
